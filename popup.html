<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            color: #222;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
        }

        .mode {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mode.work {
            color: #b85c38;
        }

        .mode.open {
            color: #2d5f3f;
        }

        .mode.idle {
            color: #888;
        }

        .time {
            font-size: 36px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            margin-bottom: 16px;
            line-height: 1;
        }

        .buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
            font-size: 13px;
            padding: 8px 14px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        button:hover {
            background: #e8e8e8;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.primary {
            background: #222;
            color: #fff;
            border-color: #222;
        }

        button.primary:hover {
            background: #000;
        }
    </style>
</head>

<body>
    <h1>ai-pomodoro</h1>
    <div class="mode" id="mode">idle</div>
    <div class="time" id="time">--:--</div>
    <div class="buttons">
        <button id="start" class="primary">Start</button>
        <button id="pause">Pause</button>
        <button id="resume">Resume</button>
        <button id="reset">Reset</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
