<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            color: #222;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
        }

        .mode {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mode-suffix {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.6;
            margin-left: 2px;
            letter-spacing: 0.02em;
        }

        .mode.work {
            color: #b85c38;
        }

        .mode.open {
            color: #2d5f3f;
        }

        .mode.idle {
            color: #888;
        }

        .time {
            font-size: 36px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            margin-bottom: 16px;
            line-height: 1;
        }

        .buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            font-family: inherit;
            font-size: 13px;
            padding: 8px 14px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        button:hover {
            background: #e8e8e8;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.primary {
            background: #222;
            color: #fff;
            border-color: #222;
        }

        button.primary:hover {
            background: #000;
        }

        .overrides {
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.5;
        }

        .overrides:empty {
            display: none;
        }

        .override-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4px 8px;
            background: rgba(184, 92, 56, 0.08);
            border-left: 2px solid #b85c38;
            margin-bottom: 4px;
            border-radius: 2px;
        }

        .override-host {
            font-family: "SF Mono", Menlo, monospace;
            color: #1a1a1a;
        }

        .override-time {
            color: #b85c38;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .durations {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .duration-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .duration-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
        }

        .duration-input {
            font-family: inherit;
            font-size: 14px;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            font-variant-numeric: tabular-nums;
            background: #fff;
            color: #1a1a1a;
        }

        .duration-input:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .duration-input:disabled {
            opacity: 0.4;
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .duration-input-error {
            border-color: #b85c38;
        }

        .round-progress {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            font-variant-numeric: tabular-nums;
        }

        .round-progress:empty {
            display: none;
        }

        .settings-link-wrap {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
        }

        .settings-link {
            font-size: 12px;
            color: #888;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .settings-link:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }

        .settings-link-wrap {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
        }

        .settings-link {
            font-size: 12px;
            color: #888;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .settings-link:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>ai-pomodoro</h1>
    <div class="durations">
        <div class="duration-field">
            <label for="work-input" class="duration-label">Work (min)</label>
            <input type="number" id="work-input" class="duration-input" min="1" max="60" step="1" value="15">
        </div>
        <div class="duration-field">
            <label for="open-input" class="duration-label">Open (min)</label>
            <input type="number" id="open-input" class="duration-input" min="1" max="60" step="1" value="15">
        </div>
        <div class="duration-field">
            <label for="rounds-input" class="duration-label">Rounds</label>
            <input type="number" id="rounds-input" class="duration-input" min="1" max="20" step="1" value="4">
        </div>
    </div>
    <div class="mode" id="mode">idle</div>
    <div class="time" id="time">--:--</div>
    <div class="round-progress" id="round-progress"></div>
    <div class="overrides" id="overrides"></div>
    <div class="buttons">
        <button id="start" class="primary">Start</button>
        <button id="pause">Pause</button>
        <button id="resume">Resume</button>
        <button id="reset">Reset</button>
    </div>
    <div class="settings-link-wrap">
        <a href="#" id="open-options" class="settings-link">Modify blocked sites</a>
    </div>
    <script src="popup.js"></script>
</body>

</html>
