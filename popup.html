<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --color-bg: #faf6f1;
            --color-ink: #1a1a1a;
            --color-muted: #888;
            --color-faint: #999;
            --color-rust: #b85c38;
            --color-green: #2d5f3f;
            --color-border: #d8d3c8;
            --color-divider: #ece6dd;
            --color-input-disabled-bg: #f5f0e8;
        }

        body {
            width: 280px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            color: var(--color-ink);
            background: var(--color-bg);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brand-icon {
            width: 18px;
            height: 18px;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        h1 {
            font-size: 13px;
            font-weight: 500;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-faint);
        }

        .gear-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--color-faint);
            flex: 0 0 auto;
            width: auto;
            display: flex;
            align-items: center;
        }

        .gear-btn:hover {
            color: var(--color-ink);
            background: none;
        }

        .gear-btn svg {
            width: 14px;
            height: 14px;
        }

        /* State line: icon + label, shown only when not idle */
        .state-line {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 6px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        .state-line.work {
            color: var(--color-rust);
        }

        .state-line.open {
            color: var(--color-green);
        }

        .state-line.paused {
            color: var(--color-muted);
        }

        .state-line svg {
            width: 11px;
            height: 13px;
            flex-shrink: 0;
        }

        .state-suffix {
            font-weight: 400;
            opacity: 0.7;
            margin-left: 2px;
            letter-spacing: 0.02em;
        }

        .time {
            font-size: 44px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
            line-height: 1;
        }

        .time.paused {
            color: var(--color-muted);
        }

        .round-progress {
            font-size: 12px;
            color: #666;
            margin-bottom: 18px;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        .round-progress:empty {
            margin-bottom: 0;
        }

        /* Divider above inputs when idle */
        .section-divider {
            border-top: 1px solid var(--color-divider);
            margin: 14px 0;
        }

        /* Inputs section — hidden when not idle */
        .durations {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .duration-field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .duration-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--color-muted);
            font-weight: 600;
        }

        .duration-label svg {
            width: 9px;
            height: 11px;
            flex-shrink: 0;
        }

        .duration-label.solo svg {
            stroke: var(--color-rust);
        }

        .duration-label.assist svg {
            stroke: var(--color-green);
        }

        .duration-label.rounds svg {
            stroke: var(--color-muted);
        }

        .duration-input-row {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 6px 8px;
            background: #fff;
        }

        .duration-input-row:focus-within {
            border-color: var(--color-ink);
        }

        .duration-input-row.duration-input-error {
            border-color: var(--color-rust);
        }

        .duration-input {
            flex: 1;
            font-family: inherit;
            font-size: 14px;
            border: none;
            background: transparent;
            font-variant-numeric: tabular-nums;
            color: var(--color-ink);
            min-width: 0;
            width: 100%;
            padding: 0;
            outline: none;
        }

        .duration-unit {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        /* Overrides list */
        .overrides {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .overrides:empty {
            display: none;
        }

        .override-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 4px 8px;
            background: rgba(184, 92, 56, 0.08);
            border-left: 2px solid var(--color-rust);
            margin-bottom: 4px;
            border-radius: 0 2px 2px 0;
        }

        .override-host {
            font-family: "SF Mono", Menlo, monospace;
            color: var(--color-ink);
            font-size: 11px;
        }

        .override-time {
            color: var(--color-rust);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-size: 11px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 6px;
        }

        button {
            font-family: inherit;
            font-size: 13px;
            padding: 10px;
            border: 1px solid var(--color-border);
            background: transparent;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        button:hover {
            background: #f0e8dc;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--color-ink);
            color: #fff;
            border-color: var(--color-ink);
            flex: 2;
            font-weight: 500;
        }

        button.primary:hover {
            background: #000;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="brand">
            <img src="icons/icon-48.png" alt="" class="brand-icon">
            <h1>ai-pomodoro</h1>
        </div>
        <button id="open-options" class="gear-btn" aria-label="Modify blocked sites" title="Modify blocked sites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                </path>
            </svg>
        </button>
    </div>

    <div class="state-line" id="state-line"></div>
    <div class="time" id="time">--:--</div>
    <div class="round-progress" id="round-progress"></div>
    <div class="overrides" id="overrides"></div>

    <div class="section-divider" id="section-divider"></div>

    <div class="durations" id="durations">
        <div class="duration-field">
            <label for="work-input" class="duration-label solo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                AI · Solo
            </label>
            <div class="duration-input-row">
                <input type="number" id="work-input" class="duration-input" min="1" max="60" step="1" value="15"
                    placeholder="--">
                <span class="duration-unit">min</span>
            </div>
        </div>
        <div class="duration-field">
            <label for="open-input" class="duration-label assist">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                </svg>
                AI · Assist
            </label>
            <div class="duration-input-row">
                <input type="number" id="open-input" class="duration-input" min="1" max="60" step="1" value="15"
                    placeholder="--">
                <span class="duration-unit">min</span>
            </div>
        </div>
        <div class="duration-field">
            <label for="rounds-input" class="duration-label rounds">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 14.85-6.85L20 7"></path>
                    <path d="M20 4v3h-3"></path>
                    <path d="M21 12a9 9 0 0 1-14.85 6.85L4 17"></path>
                    <path d="M4 20v-3h3"></path>
                </svg>
                Rounds
            </label>
            <div class="duration-input-row">
                <input type="number" id="rounds-input" class="duration-input" min="1" max="20" step="1" value="4"
                    placeholder="--">
            </div>
        </div>
    </div>

    <div class="buttons">
        <button id="start" class="primary">Start session</button>
        <button id="clear">Clear</button>
        <button id="pause" class="primary">Pause</button>
        <button id="resume" class="primary">Resume</button>
        <button id="end">End</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
